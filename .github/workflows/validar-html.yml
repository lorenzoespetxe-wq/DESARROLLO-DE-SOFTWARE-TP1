name: Validación Avanzada de HTML

on: [push]

jobs:
  lint-html:
    name: Linting de código HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Instalar HTMLHint
        run: npm install -g htmlhint
        
      - name: Ejecutar HTMLHint
        # Cambiado para buscar en todo el repo, incluyendo la raíz
        run: htmlhint "*/.html"

  w3c-validation:
    name: Validación Estricta W3C
    needs: lint-html 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar validador HTML5
        run: pip install html5validator
        
      - name: Ejecutar validación W3C
        # Cambiado --root a . (punto) para que valide la raíz
        run: html5validator --root . --match "*.html"